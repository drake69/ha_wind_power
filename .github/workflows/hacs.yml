name: HACS Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main 2026-04-08
        with:
          category: integration
          # 'brands' requires registration in the external home-assistant/brands
          # repo (a PR approved by the HA team). Ignored until the integration
          # is published on HACS; remove after registering the brand.
          ignore: brands
